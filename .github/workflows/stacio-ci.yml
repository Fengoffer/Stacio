name: Stacio CI

on:
  push:
    paths-ignore:
      - "docs/**"
      - "dist/**"
  pull_request:
    paths-ignore:
      - "docs/**"
      - "dist/**"
  workflow_dispatch:

concurrency:
  group: stacio-ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  validate:
    name: Build, Test, and Release Readiness
    runs-on: macos-14
    timeout-minutes: 120

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Show toolchain versions
        run: |
          swift --version
          rustc --version
          cargo --version

      - name: Install Node dependencies
        uses: actions/setup-node@v4
        with:
          node-version: "22"
          cache: npm

      - name: Install package resources
        run: npm ci

      - name: Install release packaging dependencies
        run: |
          python3 -m venv .venv
          .venv/bin/python -m pip install --upgrade pip
          .venv/bin/python -m pip install pillow
          echo "$PWD/.venv/bin" >> "$GITHUB_PATH"
          if ! command -v cmake >/dev/null 2>&1; then
            brew install cmake
          fi

      - name: Install clippy
        if: github.event_name == 'workflow_dispatch'
        run: rustup component add clippy

      - name: Build Rust core for Swift linkage
        run: ./scripts/build-core.sh

      - name: Swift build
        run: swift build

      - name: Swift test
        run: swift test

      - name: Rust test
        working-directory: StacioCore
        run: cargo test

      - name: Rust clippy (manual, non-blocking)
        if: github.event_name == 'workflow_dispatch'
        working-directory: StacioCore
        continue-on-error: true
        run: cargo clippy --all-targets --all-features

      - name: Verify generated UniFFI bindings are current
        run: |
          ./scripts/generate-uniffi.sh
          git diff --exit-code -- Stacio/Bridge/Generated

      - name: Release readiness
        env:
          STACIO_ALLOW_FALLBACK_APP_ICON: "1"
          STACIO_ALLOW_INCOMPLETE_PRODUCT_OPS_CONFIG: "1"
          STACIO_BUILD_NUMBER: "${{ github.run_number }}"
          STACIO_DMG_SKIP_FINDER_LAYOUT: "1"
          STACIO_RELEASE_LOCAL_SMOKE: "1"
        run: ./scripts/release-readiness.sh
