server {
    listen 80;
    listen [::]:80;
    server_name ops.stacio.cn;

    location ^~ /.well-known/acme-challenge/ {
        root /www/sites/ops.stacio.cn/index;
        default_type text/plain;
        try_files $uri =404;
    }

    location / {
        return 301 https://$host$request_uri;
    }
}

server {
    listen 443 ssl;
    listen [::]:443 ssl;
    http2 on;
    server_name ops.stacio.cn;

    access_log /www/sites/ops.stacio.cn/log/access.log main;
    error_log /www/sites/ops.stacio.cn/log/error.log;

    ssl_certificate /www/sites/ops.stacio.cn/ssl/certificates/ops.stacio.cn.crt;
    ssl_certificate_key /www/sites/ops.stacio.cn/ssl/certificates/ops.stacio.cn.key;
    ssl_protocols TLSv1.3 TLSv1.2;
    ssl_session_cache shared:StacioOpsSSL:10m;
    ssl_session_timeout 10m;

    add_header Strict-Transport-Security "max-age=31536000; includeSubDomains" always;
    add_header X-Content-Type-Options "nosniff" always;
    add_header X-Frame-Options "DENY" always;
    add_header Referrer-Policy "same-origin" always;

    location /updates/ {
        proxy_pass http://127.0.0.1:18082;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Host $host;
        proxy_set_header X-Forwarded-Port $server_port;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_read_timeout 60s;
        proxy_send_timeout 60s;
    }

    location / {
        proxy_pass http://127.0.0.1:18081;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Host $host;
        proxy_set_header X-Forwarded-Port $server_port;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection $http_connection;
        proxy_read_timeout 60s;
        proxy_send_timeout 60s;
    }
}
