services:
  stacio-website:
    build:
      context: .
    image: stacio-website:latest
    container_name: stacio-website
    restart: unless-stopped
    ports:
      - "${STACIO_WEBSITE_HOST:-127.0.0.1}:${STACIO_WEBSITE_PORT:-8080}:80"
    healthcheck:
      test: ["CMD", "wget", "-qO-", "http://127.0.0.1/healthz"]
      interval: 30s
      timeout: 3s
      retries: 3
      start_period: 5s
